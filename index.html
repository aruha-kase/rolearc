  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Service Worker: fetchを素通しすることでiframe(reactive立ち絵)等のリソースに
      // ブラウザHTTPキャッシュを効かせ、表情切り替え(URL差し替え)を高速化する。
      // ※コンソールに一部CORSエラーが出るが表示・動作に実害はない（キャッシュ高速化を優先）。
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js');
        });
      }
    </script>
  </body>
